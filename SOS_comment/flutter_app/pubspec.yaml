name: review_guard
description: "E-Commerce app with System-Level Fall Detection SOS and Remote AI review detection."
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.11.0-200.1.beta

dependencies:
  flutter:
    sdk: flutter

  # ─── Remote ML ─────────────────────────────────────────────────────────────
  http: ^1.1.0

  # ─── Safety & Sensors ──────────────────────────────────────────────────────
  sensors_plus: ^6.1.1
  geolocator: ^13.0.1
  camera: ^0.11.1
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  share_plus: ^10.1.3
  
  # ─── Background & Notifications ───────────────────────────────────────────
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.1.0
  flutter_local_notifications: ^18.0.1
  device_info_plus: ^11.1.3

  # ─── Utilities ────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/vocab.json 
