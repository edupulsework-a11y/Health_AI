name: nutreva
description: "AI-powered decentralized digital health ecosystem."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0-200.1.beta

dependencies:
  flutter:
    sdk: flutter

  # ── UI ──────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  fl_chart: ^1.1.1

  # ── State Management ────────────────────────────────
  flutter_riverpod: ^3.2.1

  # ── Navigation ──────────────────────────────────────
  go_router: ^13.2.0

  # ── Networking ──────────────────────────────────────
  http: ^1.6.0
  dio: ^5.4.1

  # ── Firebase RTDB (ESP8266 sensor data) ─────────────
  firebase_core: ^3.3.0
  firebase_database: ^11.1.0

  # ── AI ──────────────────────────────────────────────
  google_generative_ai: ^0.4.7

  # ── Auth & Backend ───────────────────────────────────
  supabase_flutter: ^2.12.0
  google_sign_in: ^6.1.5

  # ── Local Storage ────────────────────────────────────
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # ── Blockchain ──────────────────────────────────────
  web3dart: ^2.7.3

  # ── Health / Wearables ──────────────────────────────
  health: ^13.2.0

  # ── Camera / Imaging ────────────────────────────────
  camera: ^0.11.3
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.11.0

  # ── Files ───────────────────────────────────────────
  file_picker: ^10.3.10
  open_file: ^3.3.2

  # ── PDF ─────────────────────────────────────────────
  pdf: ^3.11.3
  printing: ^5.14.2

  # ── Utilities ───────────────────────────────────────
  # intl must be ^0.20.2 — pinned by flutter_localizations + stream_video_flutter
  intl: ^0.20.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  path_provider: ^2.1.5
  path: any
  url_launcher: ^6.2.6
  permission_handler: ^12.0.1
  crypto: ^3.0.7

  # ── Video Calls (Stream + Agora) ─────────────────────
  stream_video_flutter: ^1.2.4
  agora_rtc_engine: ^6.5.3

  # ── Multiple Result ──────────────────────────────────
  multiple_result: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/ml/
